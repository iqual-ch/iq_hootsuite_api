iq_hootsuite_api.settings:
  path: 'admin/config/services/iq_hootsuite_api'
  defaults:
    _form: '\Drupal\iq_hootsuite_api\Form\SettingsForm'
    _title: 'Hootsuite API Settings'
  requirements:
    _permission: 'administer iq hootsuite api'

iq_hootsuite_api.callback:
  path: 'iq_hootsuite_api/callback'
  defaults:
    _controller: '\Drupal\iq_hootsuite_api\Controller\CallbackController::callback'
  methods: [GET]
  requirements:
    _permission: 'administer iq hootsuite api'

iq_hootsuite_api.test:
  path: 'admin/config/services/iq_hootsuite_api/test'
  defaults:
    _controller: '\Drupal\iq_hootsuite_api\Controller\ApiTestController::testPage'
    _title: 'Hootsuite API Test Console'
  requirements:
    _permission: 'administer iq hootsuite api'

iq_hootsuite_api.test_execute:
  path: 'admin/config/services/iq_hootsuite_api/test/execute'
  defaults:
    _controller: '\Drupal\iq_hootsuite_api\Controller\ApiTestController::executeRequest'
  methods: [POST]
  requirements:
    _permission: 'administer iq hootsuite api'
